<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Fit - Tu Transformación Empieza Aquí</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bienvenido a <span class="highlight">Iron Fit</span></h1>
            <p>Supera tus límites y alcanza tu mejor versión.</p>
        </header>

        <main>
            <section class="hero-image">
                <!-- Icono representativo de gimnasio -->
                <img src="https://flaticon.com" alt="Gym Icon" class="icon">
            </section>

            <section class="services">
                <p>Ofrecemos entrenamiento personalizado en: <br> 
                <strong>Crossfit, Powerlifting y Nutrición.</strong></p>
                <button class="btn-join" onclick="alert('¡Inscripción enviada! Nos vemos en el entrenamiento. 💪')">
                    ¡Empieza hoy mismo!
                </button>
            </section>
        </main>

        <footer>
            <p>© 2026 Iron Fit Gym | Calidad y Fuerza</p>
        </footer>
    </div>
</body>
</html>
